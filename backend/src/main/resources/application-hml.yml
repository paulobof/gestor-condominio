logging:
  level:
    root: INFO
    br.com.condominio: DEBUG
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

spring:
  jpa:
    # Flyway e a autoridade de schema. Validate + globally_quoted_identifiers
    # rejeita tipos nativos do Postgres (inet, citext) mapeados como String.
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
