management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    br.com.condominio: INFO
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  jpa:
    # Flyway e a autoridade de schema. Validate + globally_quoted_identifiers
    # rejeita tipos nativos do Postgres (inet, citext) mapeados como String.
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
