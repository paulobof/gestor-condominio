spring:
  application:
    name: gestor-condominio
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gestor_condominio}
    username: ${POSTGRES_USER:condominio}
    password: ${POSTGRES_PASSWORD:condominio_dev}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 2000
      leak-detection-threshold: 60000
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
      file-size-threshold: 1MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true
        jdbc.lob.non_contextual_creation: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    placeholders:
      adminEmail: ${APP_ADMIN_EMAIL:paulobof@gmail.com}
      adminName: ${APP_ADMIN_NAME:Paulo}
  lifecycle:
    timeout-per-shutdown-phase: 20s
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 100

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    git:
      mode: simple

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  security:
    password:
      pepper: ${APP_PASSWORD_PEPPER:VFJPQ0EtRVNTRS1QRVBQRVItRU0tUFJPRC09PT09PT09PT09PT0=}
      pepper-version: ${APP_PASSWORD_PEPPER_VERSION:1}
      bcrypt-strength: ${APP_BCRYPT_STRENGTH:12}
    jwt:
      issuer: ${APP_JWT_ISSUER:gestor-condominio}
      audience: ${APP_JWT_AUDIENCE:gestor-condominio-web}
      access-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
      refresh-ttl: ${APP_JWT_REFRESH_TTL:P7D}
      active-kid: ${APP_JWT_ACTIVE_KID:v1}
      keys: ${APP_JWT_KEYS:v1:VFJPQ0EtRVNTRS1KV1QtRU0tUFJPRC09PT09PT09PT09PT0=}
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    cookie:
      domain: ${APP_COOKIE_DOMAIN:}
      secure: ${APP_COOKIE_SECURE:false}
  ratelimit:
    login-per-min-per-ip: 5
    login-lockout-attempts: 10
    login-lockout-window: PT30M
  admin:
    email: ${APP_ADMIN_EMAIL:paulobof@gmail.com}
    name: ${APP_ADMIN_NAME:Paulo}
    initial-password: ${APP_ADMIN_INITIAL_PASSWORD:trocar-no-primeiro-login}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:condominio}
      secret-key: ${MINIO_SECRET_KEY:condominio_dev}
      bucket-proofs: ${MINIO_BUCKET_PROOFS:residence-proofs}
      bucket-classifieds: ${MINIO_BUCKET_CLASSIFIEDS:classifieds}
      bucket-recommendations: ${MINIO_BUCKET_RECOMMENDATIONS:recommendations}
      presigned-ttl-proofs-seconds: ${MINIO_PRESIGNED_TTL_PROOFS_SECONDS:300}
      presigned-ttl-photos-seconds: ${MINIO_PRESIGNED_TTL_PHOTOS_SECONDS:600}
  whatsapp:
    base-url: ${APP_WHATSAPP_BASE_URL:http://localhost:9999}
    api-key: ${APP_WHATSAPP_API_KEY:dev-placeholder}
    instance: ${APP_WHATSAPP_INSTANCE:dev}
    timeout-ms: ${APP_WHATSAPP_TIMEOUT_MS:5000}
    max-retries: ${APP_WHATSAPP_MAX_RETRIES:5}
    retry-interval-ms: ${APP_WHATSAPP_RETRY_INTERVAL_MS:60000}
  password-reset:
    ttl: ${APP_PASSWORD_RESET_TTL:PT30M}
    base-url: ${APP_PASSWORD_RESET_BASE_URL:http://localhost:5173/reset}
  proof-retention-days: ${APP_PROOF_RETENTION_DAYS:180}
  inactive-account-anonymize-months: ${APP_INACTIVE_ACCOUNT_MONTHS:12}
  feature:
    classifieds:
      enabled: ${APP_FEATURE_CLASSIFIEDS_ENABLED:false}
    recommendations:
      enabled: ${APP_FEATURE_RECOMMENDATIONS_ENABLED:false}
    announcements:
      enabled: ${APP_FEATURE_ANNOUNCEMENTS_ENABLED:false}
    faq:
      enabled: ${APP_FEATURE_FAQ_ENABLED:false}
  recommendation:
    consent-base-url: ${APP_RECOMMENDATION_CONSENT_BASE_URL:http://localhost:5173/indicacoes/pendentes}

resilience4j:
  timelimiter:
    instances:
      whatsapp:
        timeoutDuration: ${APP_WHATSAPP_TIMEOUT_MS:5000}ms
  retry:
    instances:
      whatsapp:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - br.com.condominio.feature.whatsapp.WhatsAppSendException
  circuitbreaker:
    instances:
      whatsapp:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
