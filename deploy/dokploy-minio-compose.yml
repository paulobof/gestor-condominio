# MinIO (Dokploy compose). Reflete o que está implantado em prod.
# CRÍTICO: o serviço precisa entrar na rede externa `dokploy-network` (compartilhada
# com o backend) e expor um alias estável (`minio-prod-svc`). O backend acessa o MinIO
# por esse alias (MINIO_ENDPOINT=http://minio-prod-svc:9000). Sem o alias/rede, o host
# não resolve (UnknownHostException) e o upload de comprovante falha no cadastro.
services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - minio-data-v2:/data
    expose:
      - "9000"
      - "9001"
    networks:
      dokploy-network:
        aliases:
          - minio-prod-svc
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  minio-data-v2:

networks:
  dokploy-network:
    external: true
