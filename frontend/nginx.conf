server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # connect-src precisa do dominio da API (subdominios helbor) — frontend e backend ficam em
  # origens diferentes (hml.app.* vs hml.api.*). img-src idem para fotos via presigned URL (MinIO).
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.helbor.paulobof.com.br; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://*.helbor.paulobof.com.br; script-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;
}
